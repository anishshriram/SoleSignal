<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoleSignal BLE Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header { text-align: center; margin-bottom: 40px; }
    header h1 { font-size: 2rem; letter-spacing: 0.08em; color: #ffffff; }
    header p  { color: #888; margin-top: 6px; font-size: 0.9rem; }

    .card {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 580px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #666;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.green  { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .dot.yellow { background: #eab308; box-shadow: 0 0 8px #eab30888; }
    .dot.red    { background: #ef4444; box-shadow: 0 0 8px #ef444488; }

    .status-text { font-size: 0.9rem; color: #ccc; }

    button {
      display: block; width: 100%;
      padding: 14px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, background 0.2s;
      margin-top: 8px; letter-spacing: 0.03em;
    }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    #btn-scan { background: #2563eb; color: #fff; }
    #btn-scan:not(:disabled):hover { background: #1d4ed8; }

    #btn-disconnect {
      background: #1f1f1f; color: #ef4444;
      border: 1px solid #ef4444;
    }
    #btn-disconnect:not(:disabled):hover { background: #2c1212; }

    #log-container {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.78rem;
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 14px;
      height: 220px;
      overflow-y: auto;
      color: #6b7280;
    }
    #log-container .entry { margin-bottom: 3px; line-height: 1.5; }
    #log-container .entry.info  { color: #9ca3af; }
    #log-container .entry.ok    { color: #22c55e; }
    #log-container .entry.warn  { color: #eab308; }
    #log-container .entry.error { color: #ef4444; }
    #log-container .ts { color: #374151; margin-right: 6px; }

    /* Alert popup overlay */
    #alert-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #alert-overlay.show { display: flex; }

    #alert-modal {
      background: #141414;
      border: 2px solid #ef4444;
      border-radius: 16px;
      padding: 40px 48px;
      text-align: center;
      box-shadow: 0 0 40px #ef444444;
    }
    #alert-modal h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ef4444;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
    }
    #alert-modal button {
      width: auto;
      padding: 10px 32px;
      background: #ef4444;
      color: #fff;
      border-radius: 8px;
      font-size: 0.9rem;
    }
    #alert-modal button:hover { background: #dc2626; }
  </style>
</head>
<body>

<header>
  <h1>SoleSignal</h1>
  <p>BLE Demo v1 &mdash; XIAO ESP32C3 &mdash; FSR 402 Insole Sensor</p>
</header>

<!-- ── Connection Card ─────────────────────────────── -->
<div class="card">
  <h2>Connection</h2>

  <div class="status-row">
    <div class="dot" id="dot-ble"></div>
    <span class="status-text" id="txt-ble">Bluetooth not checked</span>
  </div>
  <div class="status-row">
    <div class="dot" id="dot-conn"></div>
    <span class="status-text" id="txt-conn">Disconnected</span>
  </div>

  <button id="btn-scan">Scan &amp; Connect</button>
  <button id="btn-disconnect" disabled>Disconnect</button>
</div>

<!-- ── Event Log Card ─────────────────────────────── -->
<div class="card">
  <h2>Event Log</h2>
  <div id="log-container"></div>
</div>

<!-- ── Alert popup ────────────────────────────────── -->
<div id="alert-overlay">
  <div id="alert-modal">
    <h3>Alert Activated</h3>
    <button id="btn-dismiss">Dismiss</button>
  </div>
</div>

<script>
  const SERVICE_UUID        = "12345678-1234-1234-1234-1234567890ab";
  const CHARACTERISTIC_UUID = "99999999-8888-7777-6666-555555555555";

  let device         = null;
  let characteristic = null;

  const dotBle   = document.getElementById("dot-ble");
  const txtBle   = document.getElementById("txt-ble");
  const dotConn  = document.getElementById("dot-conn");
  const txtConn  = document.getElementById("txt-conn");
  const btnScan  = document.getElementById("btn-scan");
  const btnDisc  = document.getElementById("btn-disconnect");
  const overlay  = document.getElementById("alert-overlay");
  const logBox   = document.getElementById("log-container");

  document.getElementById("btn-dismiss").addEventListener("click", () => {
    overlay.classList.remove("show");
  });

  function log(msg, level = "info") {
    const ts  = new Date().toLocaleTimeString("en-US", { hour12: false });
    const div = document.createElement("div");
    div.className = `entry ${level}`;
    div.innerHTML = `<span class="ts">${ts}</span>${msg}`;
    logBox.appendChild(div);
    logBox.scrollTop = logBox.scrollHeight;
  }

  async function checkBluetooth() {
    if (!navigator.bluetooth) {
      dotBle.className = "dot red";
      txtBle.textContent = "Web Bluetooth not supported (use Chrome/Edge on desktop or Android)";
      log("Web Bluetooth API unavailable.", "error");
      btnScan.disabled = true;
      return false;
    }
    const available = await navigator.bluetooth.getAvailability();
    if (!available) {
      dotBle.className = "dot red";
      txtBle.textContent = "Bluetooth adapter off or unavailable";
      log("No Bluetooth adapter found.", "warn");
      btnScan.disabled = true;
      return false;
    }
    dotBle.className = "dot green";
    txtBle.textContent = "Bluetooth ready";
    log("Bluetooth adapter ready.", "ok");
    return true;
  }

  async function connect() {
    btnScan.disabled = true;
    log("Opening BLE device picker…", "info");

    try {
      device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }],
        optionalServices: [SERVICE_UUID],
      });

      log(`Device selected: "${device.name || device.id}"`, "ok");
      device.addEventListener("gattserverdisconnected", onDisconnected);

      dotConn.className = "dot yellow";
      txtConn.textContent = "Connecting…";

      const server = await device.gatt.connect();
      log("GATT server connected.", "ok");

      const service = await server.getPrimaryService(SERVICE_UUID);
      characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

      await characteristic.startNotifications();
      characteristic.addEventListener("characteristicvaluechanged", onData);
      log("Notifications started — waiting for data…", "ok");

      dotConn.className = "dot green";
      txtConn.textContent = `Connected — ${device.name || device.id}`;
      btnDisc.disabled = false;

    } catch (err) {
      log(`Connection failed: ${err.message}`, "error");
      dotConn.className = "dot red";
      txtConn.textContent = "Connection failed";
      btnScan.disabled = false;
    }
  }

  function onData(event) {
    const value = new TextDecoder().decode(event.target.value).trim();
    log(`Received: "${value}"`, "info");

    if (value === "1") {
      overlay.classList.add("show");
      log("Alert activated!", "error");
    }
  }

  function onDisconnected() {
    dotConn.className = "dot red";
    txtConn.textContent = "Disconnected";
    btnScan.disabled = false;
    btnDisc.disabled = true;
    characteristic = null;
    log("Device disconnected.", "warn");
  }

  async function disconnect() {
    if (characteristic) {
      try { await characteristic.stopNotifications(); } catch (_) {}
    }
    if (device && device.gatt.connected) {
      device.gatt.disconnect();
    }
  }

  btnScan.addEventListener("click", async () => {
    if (await checkBluetooth()) await connect();
  });
  btnDisc.addEventListener("click", disconnect);

  checkBluetooth();
</script>
</body>
</html>
